name: Notify wiki of changes

on:
  push:
    branches: [main]
    paths:
      - "**/models/**"
      - "**/schemas/**"
      - "**/routes/**"
      - "**/routers/**"
      - "**/prompts/**"
      - "**/pricing/**"
      - "README.md"

jobs:
  notify-wiki:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sanitize commit message
        id: meta
        run: |
          MSG=$(git log -1 --format='%s' | head -c 200 | tr -d '\n\r\t\\' | sed 's/"/'"'"'/g')
          echo "commit_msg=$MSG" >> $GITHUB_OUTPUT

      - name: Dispatch wiki sync
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.WIKI_DISPATCH_TOKEN }}
          repository: Olbrain/olbrain-wiki
          event-type: service-changed
          client-payload: |
            {
              "service_repo": "${{ github.repository }}",
              "service_repo_short": "${{ github.event.repository.name }}",
              "commit_sha": "${{ github.sha }}",
              "commit_message": "${{ steps.meta.outputs.commit_msg }}"
            }
